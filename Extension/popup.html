<!DOCTYPE html>
<html>

<head>
    <title>Maarga</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN VIEW -->
<div id="loginView" class="panel">

    <h2>Login</h2>

    <input
        id="email"
        type="text"
        placeholder="Email"
    />

    <input
        id="password"
        type="password"
        placeholder="Password"
    />

    <button id="loginBtn">
        Login
    </button>

    <p id="loginError"></p>

</div>



<!-- MAIN EXTENSION VIEW -->
<div id="appView" class="panel" style="display:none;">
    <div class="logo">
        <img id="userAvatar" class="avatar" src="logo.png" alt="Maarga" width="40%", height="30">
        <div style="font-size: 9px; margin-bottom: 10px;">Optimize your career path</div>
    </div>
    <p id="statusMessage" class="status" style="display:none;"></p>

    <label for="apiModeSelect">API Key Mode</label>
    <select id="apiModeSelect">
        <option value="default">Default</option>
        <option value="user">Custom</option>
    </select>

    <input
        id="customApiKey"
        type="password"
        placeholder="Enter custom Google API key"
        style="display:none;"
    />

    <button id="validateApiKey" style="display:none;">
        Validate API Key
    </button>
    <p id="apiKeyError"></p>

    <label for="modelSelect">Model</label>
    <select id="modelSelect">
        <option value="">Loading models...</option>
    </select>
    <p id="modelError"></p>

    <button id="send">
        Send Page To Analyzer
    </button>

    <button id="retryBtn" style="display:none; background: linear-gradient(135deg, #6366f1, #4f46e5);">
        Retry Parsing with Current Settings
    </button>


    <!-- Loading Indicator -->
    <div
        id="loading"
        class="loading"
        style="display:none;"
    >
        Parsing job description...
    </div>


    <!-- Job Details -->
    <div id="jobDetails" style="display:none;"></div>

    <!-- Analyse Section -->
    <button id="analyse" style="display:none;">
        Analyse Resume Match
    </button>

    <div id="analysis" style="display:none;"></div>


    <hr>


    <!-- Logout -->
    <button id="logout">
        Logout
    </button>

</div>


<script src="popup.js"></script>

</body>

</html>
